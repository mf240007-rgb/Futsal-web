<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - FutsalBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#1a1a2e,#16213e); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { border-radius:20px; border:none; box-shadow:0 8px 32px rgba(0,0,0,0.35); }
        .brand { color:#4fc3f7; font-weight:800; font-size:1.4rem; }
        .form-control { border-radius:10px; padding:0.65rem 1rem; }
        .form-control:focus { border-color:#4fc3f7; box-shadow:0 0 0 3px rgba(79,195,247,0.15); }
        .btn-register { background:linear-gradient(135deg,#1565c0,#4fc3f7); border:none; border-radius:10px; padding:0.65rem; font-weight:600; color:#fff; }
        .btn-register:hover { opacity:0.9; color:#fff; }
        .input-group-text { background:#f8fafc; border-right:none; border-radius:10px 0 0 10px; }
        .input-group .form-control { border-left:none; border-radius:0 10px 10px 0; }
        .input-group .form-control:focus { border-color:#4fc3f7; box-shadow:0 0 0 3px rgba(79,195,247,0.15); }
    </style>
</head>
<body>
<div style="width:100%;max-width:420px;padding:1rem;">
    <div class="card">
        <div class="card-body p-4">
            <!-- Brand -->
            <div class="text-center mb-4">
                <div class="brand"><i class="bi bi-dribbble me-2"></i>Futsal</div>
                <h5 class="mt-2 mb-1 fw-semibold" style="font-size:1.1rem;">Buat Akun Baru</h5>
                <p class="text-muted mb-0" style="font-size:0.83rem;">Daftar gratis dan mulai booking lapang</p>
            </div>

            <!-- Error -->
            <div th:if="${errorMessage}" class="alert alert-danger border-0 rounded-3 py-2 mb-3" role="alert" style="font-size:.88rem;">
                <i class="bi bi-exclamation-circle me-1"></i><span th:text="${errorMessage}"></span>
            </div>

            <!-- Form -->
            <form th:action="@{/proses-register}" method="POST" th:object="${userForm}">
                <div class="mb-3">
                    <label class="form-label fw-medium" style="font-size:.88rem;">
                        Username <span class="text-danger">*</span>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control" th:field="*{username}"
                               placeholder="Masukkan username" required autocomplete="username">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium" style="font-size:.88rem;">
                        Password <span class="text-danger">*</span>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control" th:field="*{password}"
                               placeholder="Masukkan password" required autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="btn btn-register w-100">
                    <i class="bi bi-person-plus me-2"></i>Daftar Sekarang
                </button>
            </form>

            <div class="text-center mt-3" style="font-size:.85rem;">
                Sudah punya akun? <a href="/login" class="fw-semibold" style="color:#1565c0;">Login di sini</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
