<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Futsal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#1a1a2e,#16213e); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { border-radius:20px; border:none; box-shadow:0 8px 32px rgba(0,0,0,0.35); }
        .brand { color:#4fc3f7; font-weight:800; font-size:1.4rem; }
        .form-control { border-radius:10px; padding:0.65rem 1rem; }
        .form-control:focus { border-color:#4fc3f7; box-shadow:0 0 0 3px rgba(79,195,247,0.15); }
        .btn-login { background:linear-gradient(135deg,#1565c0,#4fc3f7); border:none; border-radius:10px; padding:0.65rem; font-weight:600; color:#fff; }
        .btn-login:hover { opacity:0.9; color:#fff; }
        .input-group-text { background:#f8fafc; border-right:none; border-radius:10px 0 0 10px; }
        .input-group .form-control { border-left:none; border-radius:0 10px 10px 0; }
        .input-group .form-control:focus { border-color:#4fc3f7; box-shadow:0 0 0 3px rgba(79,195,247,0.15); }
        .divider { display:flex; align-items:center; gap:.75rem; color:#cbd5e1; font-size:.8rem; margin:1rem 0; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:#e2e8f0; }
    </style>
</head>
<body>
<div style="width:100%;max-width:420px;padding:1rem;">
    <div class="card">
        <div class="card-body p-4">

            <!-- Brand -->
            <div class="text-center mb-4">
                <div class="brand"><i class="bi bi-dribbble me-2"></i>Futsal</div>
                <h5 class="mt-2 mb-1 fw-semibold" style="font-size:1.1rem;">Selamat Datang</h5>
                <p class="text-muted mb-0" style="font-size:0.83rem;">Masuk untuk mulai booking lapang favoritmu</p>
            </div>

            <!-- Success -->
            <div th:if="${successMessage}" class="alert alert-success border-0 rounded-3 py-2 mb-3" role="alert" style="font-size:.88rem;">
                <i class="bi bi-check-circle me-1"></i><span th:text="${successMessage}"></span>
            </div>

            <!-- Error -->
            <div th:if="${errorMessage}" class="alert alert-danger border-0 rounded-3 py-2 mb-3" role="alert" style="font-size:.88rem;">
                <i class="bi bi-exclamation-circle me-1"></i><span th:text="${errorMessage}"></span>
            </div>

            <!-- Form -->
            <form action="/proses-login" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-medium" style="font-size:.88rem;">
                        Username <span class="text-danger">*</span>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control" name="username"
                               placeholder="Masukkan username" required autocomplete="username">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium" style="font-size:.88rem;">
                        Password <span class="text-danger">*</span>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control" name="password"
                               placeholder="Masukkan password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn btn-login w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
                </button>
            </form>

            <div class="divider">atau</div>

            <div class="text-center" style="font-size:.85rem;">
                Belum punya akun? <a href="/register" class="fw-semibold" style="color:#1565c0;">Daftar sekarang</a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
